name: Deploy branch apps to Pages

# Při push do JAKÉKOLI větve přestaví celý Pages site: app každé větve do /branches/<name>/
# + rozcestníkovou homepage. Publikuje na větev gh-pages (force_orphan = jeden commit, bez bloatu).

on:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # potřebujeme historii + všechny větve
      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'
      - name: Build Pages site (apps + index)
        run: python3 scripts/gen_pages_index.py site
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
