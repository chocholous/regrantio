# ROUTING — platforma (z platform_map.json) → harvester + přístupová metoda.
# Fáze 0 receptu: detect_family(host) → platforma → TADY → konkrétní harvester.
# Jediný zdroj pravdy "platforma → čím harvestovat". Čte scripts/routing.py → route(platforma).
#
# Klíče = názvy platforem v platform_map.json. Co tu není → spadne na `default`.
# Pole: harvester[] (skripty v pořadí volání), method, layer2 (potřeba LLM vrstvy 2?), note.
# POZOR: routing je VODÍTKO — při sběru se platforma + metoda VŽDY ověří živě (Fáze 0,
# "struktura před prózou"); label z mapy není pravda (viz docs/detection.md).

families:

  wordpress:
    harvester: [scripts/wp_harvest.py, scripts/harvest_site.py]
    method: "WP REST /wp-json/wp/v2 — grant CPT (project/call/programme) jinak posts/pages"
    layer2: "ano — granty často v pages/posts próze + PDF"
    note: "harvest_site.py umí WP REST autodetekcí; wp_harvest.py na konkrétní CPT.
      Plochý WP web (vše na rootu /<slug>/, např. mzd.gov.cz) → BFS je šum (3353 stránek
      → ~3 % grantů); místo toho wp_harvest.py --categories <id,..> cílí dotační kategorie
      (categories?search=dotac → strom dotace-a-programove-financovani + výzkum/EU výzvy)."

  vismo:                       # vismo_classic i vismo_modern
    harvester: [scripts/vismo.py, scripts/vismo_detail.py]
    method: "HTML-listing (.dok) → detail d-NNNN → File.ashx přílohy"
    layer2: "status z 'Úřední deska od-do', jinak Haiku na PDF přílohy"
    note: "část webů migrovala na slug URL bez d-čísla (letnany) → vismo.py má slug_mode
      (discovery 'homepage-slug' + sběr dotačně-sluggovaných odkazů); d- weby beze změny"

  dsw2_otevrenamesta:
    harvester: [scripts/dsw2.py, scripts/dsw2_fetch.py]
    method: "inline-JS (var fonds + /explore/appeals)"
    layer2: "NE — strukturované (appeals/programs/projects přímo do schématu)"

  kentico:
    harvester: [scripts/kentico_irop.py, scripts/harvest_site.py]
    method: "IROP/dotaceEU = inline pole (kentico_irop); MMR/MK/nadace bespoke = hub→getmedia (harvest_site)"
    layer2: "IROP ne (deterministicky) / jinde Haiku"

  aspnet_clanek_mvhzs:         # mv_legacy (ASP.NET MV ČR / HZS / radnice)
    harvester: [scripts/mv_cms.py]
    method: "/clanek/*.aspx + /soubor přílohy; MV WebForms kapitoly → Apify"
    layer2: "Haiku na PDF"

  marwel:                      # Marwel CMS (MŠMT msmt.gov.cz/msmt.cz)
    harvester: [scripts/marwel.py]
    method: "článek <div id=article> (perex+content) + /file/NNNNN přílohy (handler bez přípony); seed-driven"
    layer2: "ano — Výzva detail je v PDF přílohách (pdftotext); článek nese perex"

  eagri_portal:                # gov.cz portálový CMS: MZe (mze.gov.cz/eagri.cz) + MPSV (mpsv.gov.cz)
    harvester: [scripts/eagri.py, scripts/mpsv.py]
    method: "server-rendered gov.cz portál (POZOR: detekce hlásí custom_spa — MÝLKA; mpsv.gov.cz byl takto mylně označen, viz níže). MZe: obsah v ea-content-block po <h1>, přílohy = handler /public/portal/mze/-aNNNNN---HASH (bez přípony). MPSV: stejný CMS, přílohy = /cms/documents/<uuid>/<soubor>.pdf; scripts/mpsv.py reuseuje eagri.process + MPSV rozcestník→detail discovery (seed hubs: dotacni-rizeni, vyzvy1, narodni-dotacni-tituly, rodina, socialni-sluzby)"
    layer2: "ano — grantové podmínky (lhůta/částka/žadatel) jsou v příloze Zásady (docx/pdf), ne v textu stránky. POZOR MPSV: starý 'harvest' sklidil jen Nuxt SPA homepage www.mpsv.cz (0 výzev) → vždy cílit mpsv.gov.cz, NE www.mpsv.cz"

  aspnet_webforms:             # Lewis/Dynamo GrantyPortal (granty.praha, zadosti.sfzp…)
    harvester: [scripts/lewis_discover.py, scripts/lewis_dynamo.py]
    method: "Playwright objev XHR (ODataSimpleFromSql) → čistý HTTP replay BEZ Apify"
    layer2: "NE pro award DB (kind=project); otevřené výzvy jsou na navázaných CMS stránkách"

  custom_php:
    harvester: [scripts/harvest_site.py, scripts/eeagrants.py]
    method: "server-rendered → statický BFS po grant-podstránkách (harvest_site autodetekuje)"
    layer2: "ano"

  # server-rendered bespoke rodiny → univerzální harvester (sám pozná WP REST vs statický BFS)
  drupal:   {harvester: [scripts/harvest_site.py], method: "statický BFS / občas JSON:API (velký víceagendový web ministerstva → harvest_site --scope-path /cz/.../prehled-dotaci, jinak 'program/dotace' matchuje celý web); MŽP mzp.gov.cz potvrzeno", layer2: "ano"}
  joomla:   {harvester: [scripts/harvest_site.py], method: "statický BFS / občas API", layer2: "ano"}
  liferay:  {harvester: [scripts/harvest_site.py, scripts/praha_grants.py], method: "server-rendered BFS (praha_grants je Liferay-specific PoC)", layer2: "ano"}
  plone:    {harvester: [scripts/harvest_site.py], method: "folder→roční detail→.pdf (resolveuid)", layer2: "ano — zásady v PDF"}
  public4u: {harvester: [scripts/harvest_site.py], method: "statický BFS", layer2: "ano"}
  bm_cms:   {harvester: [scripts/harvest_site.py], method: "statický BFS", layer2: "ano"}

  # SPA — obsah za JS-XHR; nejdřív zkus odposlech, Apify až last resort
  custom_spa:    {harvester: [scripts/lewis_discover.py], method: "Playwright objev XHR → HTTP replay / Apify", layer2: "dle obsahu"}
  nextjs_react:  {harvester: [scripts/lewis_discover.py], method: "Playwright objev XHR → HTTP replay / Apify", layer2: "dle obsahu"}
  nuxt_vue:      {harvester: [scripts/lewis_discover.py], method: "Playwright objev XHR → HTTP replay / Apify", layer2: "dle obsahu"}
  angular:       {harvester: [scripts/lewis_discover.py], method: "Playwright objev XHR → HTTP replay / Apify", layer2: "dle obsahu"}
  grantys:       {harvester: ["Apify"], method: "gated SPA API (/api/... 403 bez session) → headless", layer2: "NE — JSON za bránou"}

  # ne-grantové / problémové
  gordic_ginis:  {harvester: [], method: "GINIS = registr/úřední deska backend, NE dotace; dotace na hlavním webu kraje (bespoke→harvest_site)", layer2: "—"}
  ERR_fetch:     {harvester: [], method: "DNS/timeout/WAF → retry / jiná IP / Apify", layer2: "—"}
  UNKNOWN:       {harvester: [], method: "re-detekce: cms_similarity + save_unknown_evidence + Sonnet (detect_platforms_wf)", layer2: "—"}

# Host-specific DEDIKOVANÉ parsery — mají PŘEDNOST před platform-family routingem.
# Důvod: generický family-harvester (wp_harvest/harvest_site/lewis_discover/Apify) u těchto webů
# nestačil → napsán bespoke parser. route_host(host) sahá SEM dřív než na rodinu (scripts/routing.py).
# Klíč = host v platform_map.json. (MŽP nemá dedikovaný parser → zůstává v rodině drupal→harvest_site.)
sources:
  # ministerstva / státní fondy s dedikovaným parserem
  mv.gov.cz:            {harvester: [scripts/mv_cms.py], note: "MV ČR — /clanek/*.aspx + /soubor"}
  msmt.gov.cz:          {harvester: [scripts/marwel.py], note: "MŠMT — Marwel CMS (seed-driven)"}
  mze.gov.cz:           {harvester: [scripts/eagri.py], note: "MZe/eAGRI — ea-content-block + příloha Zásady"}
  eagri.cz:             {harvester: [scripts/eagri.py], note: "MZe/eAGRI (starší doména)"}
  mpsv.gov.cz:          {harvester: [scripts/mpsv.py], note: "MPSV — reuse eagri.process + rozcestník→detail"}
  sfa.gov.cz:           {harvester: [scripts/sfa.py], note: "Státní fond audiovize"}
  sfzp.gov.cz:          {harvester: [scripts/sfzp.py], note: "SFŽP — WP REST výzva-* stránky (FN/PU) + Modernizační fond detail-vyzvy/?id=NN"}
  sfzp.cz:              {harvester: [scripts/sfzp.py], note: "SFŽP (redirect → sfzp.gov.cz)"}
  gacr.cz:              {harvester: [scripts/gacr.py], note: "GA ČR — WP posty 'Vyhlášení veřejné soutěže' + LA/bilaterální 'Výzva pro podávání' (discovery fulltextem, --since aktuální cyklus)"}
  tacr.cz:              {harvester: [scripts/tacr.py], note: "TA ČR (tacr.gov.cz) — aplikovaný výzkum. WP CPT `call` (veřejné soutěže) + `programme`; POZOR call.content nese jen Dokumenty → strukturované info (Soutěžní lhůta/Alokace) je jen ve FRONT-END HTML. Program z URL /soutez/<prog>/. --since aktuální cyklus. Mezinárodní partnerství (Eurostars/CET/DUT) MIMO"}
  sfpi.cz:              {harvester: [scripts/sfpi.py], note: "SFPI/SFRB — WP program-hub pages (bydlení: úvěry+dotace); discovery filtruje top-level program pages, vylučuje sub-stránky/archiv. Pozn.: část programů je page-builder (tělo přes REST prázdné)"}
  sfdi.gov.cz:          {harvester: [scripts/sfdi.py], note: "SFDI (sfdi.cz→sfdi.gov.cz) — příspěvky na dopravu (cyklostezky/chodníky/bezpečnost…). Programy = /prispevky/<slug>/ sub-pages, přes WP REST 401 → harvest FRONT-END HTML (blok 'Základní údaje o příspěvku')"}
  sfdi.cz:              {harvester: [scripts/sfdi.py], note: "SFDI (redirect → sfdi.gov.cz)"}
  sfkultury.cz:         {harvester: [scripts/sfk.py], note: "Státní fond kultury ČR — dedikovaná doména MRTVÁ (bez DNS); fond žije na mk.gov.cz/statni-fond-kultury (ASP.NET WebForms, NEstrip <form>). scripts/sfk.py discoveruje aktuální 'Žádosti o dotace SFK na rok <ROK>'; 3 výzvy/rok přes DP MK. (mk.gov.cz jinak = MK ministerstvo, kentico)"}
  mpo.gov.cz:           {harvester: [scripts/mpo.py], note: "MPO — jen NÁRODNÍ programy (TREND/TRIO/TWIST/CFF/Obchůdek/Czech Rise Up/brownfieldy/strategické investice), seed-driven landing pages. OP TAK / OP PIK (EU) sem NEpatří = P3 EU (běží přes MS2021+/AIS)"}
  mmr.gov.cz:           {harvester: [scripts/mmr.py], note: "MMR — jen NÁRODNÍ dotace pod /cs/narodni-dotace (PORR, hroby, euroregiony, bezbariérové obce, cestovní ruch, NNO…), Kentico, discovery kategorií + filtr aktuálního ročníku. MIMO: IROP/OP/EU (P3), kategorie 'Podpora bydlení' (=SFPI). Lhůty ve Výzva PDF"}
  eeagrants.cz:         {harvester: [scripts/eeagrants.py], note: "EHP a Norské fondy (NKM = Ministerstvo financí) — výzvy /programy/<oblast>/vyzvy/<rok>/<slug>. Období 2014–2021 ukončeno (closed). Vrstva 2 čistí JS/nav z těla; zdroj=ehp_norsko, typ=zahranicni_fond"}
  nsa.gov.cz:           {harvester: [scripts/nsa.py], note: "Národní sportovní agentura (agenturasport.cz→nsa.gov.cz) — dotace do sportu (Můj klub, sportovní organizace, akce, reprezentace, parasport; investiční: Regiony/Standardizovaná/Movité infrastruktura). WP+Elementor, výzvy = pages /dotace/<slug>/; content.rendered STAČÍ (strukturní blok). Discovery REST + filtr aktuálního ročníku (--year). typ=statni_agentura"}
  agenturasport.cz:     {harvester: [scripts/nsa.py], note: "NSA (redirect 301 → nsa.gov.cz)"}
  vinarskyfond.cz:      {harvester: [scripts/vinarskyfond.py], note: "Vinařský fond"}
  # nadace / nadační fondy s dedikovaným parserem (9× + Nadace Via)
  nadacevia.cz:         {harvester: [scripts/nadacevia.py], note: "Nadace Via — WP REST pages → grantové výzvy"}
  nadacnifondalbert.cz: {harvester: [scripts/albert.py], note: "Nadační fond Albert"}
  nadacesirius.cz:      {harvester: [scripts/sirius.py], note: "Nadace Sirius"}
  nadaceleontinka.cz:   {harvester: [scripts/leontinka.py], note: "Nadace Leontinka"}
  nadacepartnerstvi.cz: {harvester: [scripts/partnerstvi.py], note: "Nadace Partnerství"}
  nadace-adra.cz:       {harvester: [scripts/nadace_adra.py], note: "Nadace ADRA"}
  nadace.veronica.cz:   {harvester: [scripts/veronica.py], note: "Nadace Veronica"}
  hlavkovanadace.cz:    {harvester: [scripts/hlavka.py], note: "Nadání Josefa, Marie a Zdeňky Hlávkových"}

  # KRAJE — dedikovaný per-kraj harvester (bespoke CMS/dotační portál; generický family-harvester nestačil)
  dotace.kraj-lbc.cz:        {harvester: [scripts/liberecky_harvest.py], note: "Liberecký kraj"}
  kr-ustecky.cz:             {harvester: [scripts/ustecky_harvest.py], note: "Ústecký kraj"}
  kr-karlovarsky.cz:         {harvester: [scripts/karlovarsky_harvest.py], note: "Karlovarský kraj (+ karlovarsky_wayback_harvest.py pro archivované výzvy z web.archive.org)"}
  stredoceskykraj.cz:        {harvester: [scripts/stredocesky_harvest.py], note: "Středočeský kraj"}
  dotace.pardubickykraj.cz:  {harvester: [scripts/pardubicky_harvest.py], note: "Pardubický kraj"}
  kr-jihomoravsky.cz:        {harvester: [scripts/jm_harvest.py], note: "Jihomoravský kraj (eud.jmk.cz)"}
  kraj-jihocesky.cz:         {harvester: [scripts/jihocesky_harvest.py], note: "Jihočeský kraj"}
  olkraj.cz:                 {harvester: [scripts/olomoucky_harvest.py], note: "Olomoucký kraj"}
  msk.cz:                    {harvester: [scripts/msk_harvest.py], note: "Moravskoslezský kraj"}
  zlinskykraj.cz:            {harvester: [scripts/zlinsky_harvest.py], note: "Zlínský kraj"}
  dotace.khk.cz:             {harvester: [scripts/dotis_harvest.py], note: "Královéhradecký kraj (DOTIS, dotisreactfunctions API)"}
  fondvysociny.cz:           {harvester: [scripts/fondvysociny_harvest.py], note: "Kraj Vysočina (Fond Vysočiny)"}

  # MĚSTA / magistráty — dedikovaný per-město harvester
  praha.eu:                  {harvester: [scripts/praha_harvest.py], note: "Praha + městské části (dotace.prahaN.cz); praha_grants.py = Liferay PoC pro zdravotnictví"}
  dotace.brno.cz:            {harvester: [scripts/brno_harvest.py], note: "Brno (ekodotace/socialnipece/zdravi.brno.cz)"}
  mucl.cz:                   {harvester: [scripts/ceskalipa_harvest.py], note: "Česká Lípa"}
  granty.chomutov.cz:        {harvester: [scripts/chomutov_harvest.py], note: "Chomutov"}
  mmdecin.cz:                {harvester: [scripts/decin_harvest.py], note: "Děčín"}
  frydekmistek.cz:           {harvester: [scripts/fm_harvest.py], note: "Frýdek-Místek"}
  havirov-city.cz:           {harvester: [scripts/havirov_harvest.py], note: "Havířov"}
  dotace.mmhk.cz:            {harvester: [scripts/hk_mesto_harvest.py], note: "Hradec Králové (město)"}
  mestojablonec.cz:          {harvester: [scripts/jablonec_harvest.py], note: "Jablonec nad Nisou"}
  jihlava.cz:                {harvester: [scripts/jihlava_harvest.py], note: "Jihlava"}
  karvina.cz:                {harvester: [scripts/karvina_harvest.py], note: "Karviná"}
  mestokladno.cz:            {harvester: [scripts/kladno_harvest.py], note: "Kladno"}
  mmkv.cz:                   {harvester: [scripts/kv_mesto_harvest.py], note: "Karlovy Vary (město)"}
  granty.liberec.cz:         {harvester: [scripts/liberec_mesto_harvest.py], note: "Liberec (město)"}
  mb-net.cz:                 {harvester: [scripts/mb_harvest.py], note: "Mladá Boleslav"}
  olomouc.eu:                {harvester: [scripts/olomouc_mesto_harvest.py], note: "Olomouc (město)"}
  opava-city.cz:             {harvester: [scripts/opava_harvest.py], note: "Opava"}
  dotace.ostrava.cz:         {harvester: [scripts/ostrava_harvest.py], note: "Ostrava"}
  pardubice.eu:              {harvester: [scripts/pardubice_mesto_harvest.py], note: "Pardubice (město)"}
  dotace.plzen.eu:           {harvester: [scripts/plzen_mesto_harvest.py], note: "Plzeň (město)"}
